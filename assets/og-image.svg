<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Glow accent -->
  <circle cx="150" cy="100" r="120" fill="#f97316" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="530" r="100" fill="#22c55e" opacity="0.06" filter="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo / Icon -->
  <g transform="translate(80, 100)">
    <rect width="80" height="80" rx="20" fill="#18181b" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Git branch icon -->
    <circle cx="30" cy="22" r="6" fill="#f97316"/>
    <circle cx="50" cy="22" r="6" fill="#f97316"/>
    <circle cx="30" cy="58" r="6" fill="#22c55e"/>
    <circle cx="50" cy="58" r="6" fill="#22c55e"/>
    <line x1="30" y1="28" x2="30" y2="52" stroke="#f97316" stroke-width="2.5"/>
    <line x1="50" y1="28" x2="50" y2="52" stroke="#22c55e" stroke-width="2.5"/>
    <line x1="30" y1="22" x2="50" y2="22" stroke="#71717a" stroke-width="2"/>
    <line x1="30" y1="58" x2="50" y2="58" stroke="#71717a" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="180" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff">
    Git<tspan fill="#f97316">Cheatsheet</tspan>
  </text>

  <!-- Version badge -->
  <rect x="180" y="170" width="140" height="32" rx="16" fill="#18181b" stroke="#2a2a2a" stroke-width="1"/>
  <text x="250" y="192" text-anchor="middle" font-family="monospace" font-size="14" font-weight="600" fill="#22c55e">Git v2.54.0</text>

  <!-- Subtitle -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa">
    80+ Essential Commands • Instant Search
  </text>
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa">
    One-Click Copy • Dark Mode • Free PDF
  </text>

  <!-- Architecture diagram preview -->
  <g transform="translate(80, 380)">
    <!-- Boxes -->
    <rect width="180" height="100" rx="12" fill="#1e3a5f" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#e4e4e7">Working Dir</text>
    <text x="90" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#71717a">your files</text>

    <rect x="220" width="180" height="100" rx="12" fill="#4a4010" fill-opacity="0.3" stroke="#eab308" stroke-width="1.5"/>
    <text x="310" y="45" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#e4e4e7">Staging Area</text>
    <text x="310" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#71717a">git add</text>

    <rect x="440" width="180" height="100" rx="12" fill="#14402a" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
    <text x="530" y="45" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#e4e4e7">Local Repo</text>
    <text x="530" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#71717a">git commit</text>

    <rect x="660" width="180" height="100" rx="12" fill="#3b1f5e" fill-opacity="0.3" stroke="#a855f7" stroke-width="1.5"/>
    <text x="750" y="45" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#e4e4e7">Remote</text>
    <text x="750" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#71717a">git push</text>

    <!-- Arrows -->
    <line x1="180" y1="50" x2="218" y2="50" stroke="#52525b" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="400" y1="50" x2="438" y2="50" stroke="#52525b" stroke-width="2"/>
    <line x1="620" y1="50" x2="658" y2="50" stroke="#52525b" stroke-width="2"/>
  </g>

  <!-- URL / Author -->
  <text x="80" y="560" font-family="monospace" font-size="18" fill="#71717a">
    inayatullahshinwari.github.io/git-cheatsheet
  </text>

  <!-- Right side: author -->
  <text x="1120" y="560" text-anchor="end" font-family="system-ui" font-size="16" fill="#52525b">
    by Inayatullah Shinwari
  </text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#green)"/>
</svg>
